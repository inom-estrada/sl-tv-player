<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SL TV Player</title>

<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#video {
    width:100%;
    height:100%;
    background:#000;
}

#status {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:5px;
    font-family:Arial;
    font-size:14px;
    z-index:9999;
}

/* Diseño del botón para forzar la interacción del usuario */
#interact-overlay {
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10000;
    cursor:pointer;
}

#interact-btn {
    background:rgba(255, 0, 0, 0.8);
    color:white;
    padding:15px 30px;
    font-size:24px;
    font-family:Arial, sans-serif;
    font-weight:bold;
    border-radius:10px;
    border:2px solid white;
    text-align:center;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div id="status">Iniciando...</div>

<div id="interact-overlay">
    <div id="interact-btn">HAZ CLIC AQUÍ PARA ESCUCHAR</div>
</div>

<video
    id="video"
    controls
    autoplay
    muted
    playsinline
    webkit-playsinline>
</video>

<script>

const statusBox = document.getElementById("status");
const video = document.getElementById("video");
const interactOverlay = document.getElementById("interact-overlay");

function status(msg)
{
    console.log(msg);
    statusBox.innerHTML = msg;
}

// Captura cualquier clic en la pantalla para liberar el audio
interactOverlay.addEventListener("click", function() {
    video.muted = false;
    video.volume = 1.0;
    
    if (video.paused) {
        video.play();
    }
    
    // Ocultar el botón una vez que se hizo clic
    interactOverlay.style.display = "none";
    status("Audio activado manualmente");
});

/*
   Recupera TODO lo que viene después de ?url=
   sin que los & rompan la URL.
*/

let href = window.location.href;
let pos = href.indexOf("?url=");
let stream = "";

if(pos >= 0)
{
    stream = href.substring(pos + 5);
}

if(stream === "")
{
    status("No se recibió URL");
    interactOverlay.style.display = "none";
}
else
{
    status("Conectando...");

    let lower = stream.toLowerCase();

    if(lower.indexOf(".m3u8") > -1 || lower.indexOf(".m3u") > -1)
    {
        if(Hls.isSupported())
        {
            let hls = new Hls({
                enableWorker:true,
                lowLatencyMode:true
            });

            hls.loadSource(stream);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED,function()
            {
                status("Reproduciendo HLS (Silenciado por seguridad)");
                video.play().catch(e => console.log(e));
            });

            hls.on(Hls.Events.ERROR,function(event,data)
            {
                console.log(data);

                if(data.fatal)
                {
                    status("Error: " + data.type + " | " + data.details);
                }
            });
        }
        else
        {
            video.src = stream;
            video.play().catch(e => console.log(e));
        }
    }
    else
    {
        video.src = stream;

        video.addEventListener("loadedmetadata", function()
        {
            status("Reproduciendo (Silenciado)");
            video.play().catch(e => console.log(e));
        });

        video.addEventListener("error", function()
        {
            status("Formato no soportado");
        });
    }
}

</script>

</body>
</html>
