<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SL TV Player</title>

<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#video {
    width:100%;
    height:100%;
    background:#000;
}

#status {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:5px;
    font-family:Arial;
    font-size:14px;
    z-index:9999;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div id="status">Iniciando...</div>

<video
    id="video"
    controls
    autoplay
    muted
    playsinline
    webkit-playsinline>
</video>

<script>

const statusBox = document.getElementById("status");
const video = document.getElementById("video");

function status(msg)
{
    console.log(msg);
    statusBox.innerHTML = msg;
}

/*
   Recupera TODO lo que viene después de ?url=
   sin que los & rompan la URL.
*/

let href = window.location.href;

let pos = href.indexOf("?url=");

let stream = "";

if(pos >= 0)
{
    stream = href.substring(pos + 5);
}

if(stream === "")
{
    status("No se recibió URL");
}
else
{
    status("Conectando...");

    let lower = stream.toLowerCase();

    if(lower.indexOf(".m3u8") > -1 || lower.indexOf(".m3u") > -1)
    {
        if(Hls.isSupported())
        {
            let hls = new Hls({
                enableWorker:true,
                lowLatencyMode:true
            });

            hls.loadSource(stream);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED,function()
            {
                status("Reproduciendo HLS");
                video.play();
            });

            hls.on(Hls.Events.ERROR,function(event,data)
            {
                console.log(data);

                if(data.fatal)
                {
                    status(
                        "Error: " +
                        data.type +
                        " | " +
                        data.details
                    );
                }
            });
        }
        else
        {
            video.src = stream;
            video.play();
        }
    }
    else
    {
        video.src = stream;

        video.addEventListener(
            "loadedmetadata",
            function()
            {
                status("Reproduciendo");
                video.play();
            }
        );

        video.addEventListener(
            "error",
            function()
            {
                status("Formato no soportado");
            }
        );
    }
}

</script>

</body>
</html>
