<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SL TV Player</title>
<style>
    html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; }
    #video { width:100%; height:100%; background:#000; }
    #status { position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.6); padding:5px; font-family:Arial; font-size:14px; z-index:9999; }
    #audio-unmute-overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.75); display:flex; justify-content:center; align-items:center; z-index:10000; cursor:pointer; }
    #unmute-text { color:white; font-size:20px; font-family:Arial, sans-serif; font-weight:bold; border:2px solid white; padding:12px 24px; border-radius:8px; background:rgba(255,255,255,0.1); text-align:center; }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div id="status">Iniciando...</div>
<div id="audio-unmute-overlay">
    <div id="unmute-text">🔊 TOCAR PANTALLA PARA AUDIO</div>
</div>

<video id="video" controls autoplay muted playsinline webkit-playsinline></video>

<script>
const statusBox = document.getElementById("status");
const video = document.getElementById("video");
const unmuteOverlay = document.getElementById("audio-unmute-overlay");

function status(msg) {
    console.log(msg);
    statusBox.innerHTML = msg;
}

unmuteOverlay.addEventListener("click", function() {
    video.muted = false;
    video.volume = 1.0;
    if (video.paused) { video.play().catch(e => console.log(e)); }
    unmuteOverlay.style.display = "none";
    status("Audio activado");
});

const params = new URLSearchParams(window.location.search);
let stream = params.get("url");

if (!stream) {
    status("No se recibió URL");
    unmuteOverlay.style.display = "none";
} else {
    stream = decodeURIComponent(stream);
    status("Conectando...");

    let lower = stream.toLowerCase();

    if (lower.indexOf(".m3u8") > -1 || lower.indexOf(".m3u") > -1) {
        if (Hls.isSupported()) {
            let hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                xhrSetup: function(xhr, url) {
                    xhr.setRequestHeader("Referer", "https://ok.ru/");
                    xhr.withCredentials = true;
                }
            });

            hls.loadSource(stream);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                status("Reproduciendo HLS");
                video.play().catch(e => console.log(e));
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    status("Error Fatal: " + data.type + " | " + data.details);
                } else {
                    console.log("Error no fatal: " + data.details);
                }
            });
        } else {
            video.src = stream;
            video.play().catch(e => console.log(e));
        }
    } else {
        video.src = stream;
        video.addEventListener("loadedmetadata", () => { status("Reproduciendo"); video.play().catch(e => console.log(e)); });
        video.addEventListener("error", () => { status("Formato no soportado"); });
    }
}
</script>
</body>
</html>
