<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SL TV Player - Cinema Edition</title>
<style>
html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
/* REGRESAMOS A PANTALLA COMPLETA TOTAL (100%) */
#video, #yt-placeholder { width: 100%; height: 100%; background: #000; border: none; position: absolute; top: 0; left: 0; }
#yt-placeholder { display: none; }
#status { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0, 0, 0, 0.7); padding: 5px 10px; font-family: Arial, sans-serif; font-size: 13px; border-radius: 4px; z-index: 9999; animation: fadeOut 4s forwards; animation-delay: 4s; opacity: 1; }
@keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
#audio-unmute-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.80); display: flex; justify-content: center; align-items: center; z-index: 10000; cursor: pointer; }
#unmute-text { color: white; font-size: 18px; font-family: Arial, sans-serif; font-weight: bold; border: 2px solid white; padding: 15px 30px; border-radius: 8px; background: rgba(255, 255, 255, 0.1); text-align: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
</style>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div id="status">Iniciando Sync...</div>

<div id="audio-unmute-overlay">
    <div id="unmute-text">🔊 ENTRAR A LA FUNCIÓN (ACTIVAR AUDIO)</div>
</div>

<video id="video" autoplay muted playsinline webkit-playsinline></video>
<div id="yt-placeholder"></div>

<script>
const statusBox = document.getElementById("status");
const video = document.getElementById("video");
const ytPlaceholder = document.getElementById("yt-placeholder");
const unmuteOverlay = document.getElementById("audio-unmute-overlay");

let isYouTube = false;
let ytPlayer = null;
let audioRequested = false;

function status(msg) {
    console.log(msg);
    statusBox.innerHTML = msg;
}

function getYouTubeId(url) {
    let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    let match = url.match(regExp);
    if (match && match[2].length === 11) return match[2];
    if (url.includes("/live/")) { let parts = url.split("/live/"); if (parts[1]) return parts[1].split(/[?#&]/)[0]; }
    if (url.includes("/shorts/")) { let parts = url.split("/shorts/"); if (parts[1]) return parts[1].split(/[?#&]/)[0]; }
    return null;
}

const params = new URLSearchParams(window.location.search);
let stream = params.get("url");
let syncTime = params.get("sync"); 
let elapsedSeconds = 0;

if (syncTime) {
    let currentUnix = Math.floor(Date.now() / 1000);
    elapsedSeconds = currentUnix - parseInt(syncTime);
    if (elapsedSeconds < 0) elapsedSeconds = 0;
}

unmuteOverlay.addEventListener("click", function() {
    audioRequested = true;
    if (isYouTube) {
        if (ytPlayer && typeof ytPlayer.unMute === "function") {
            ytPlayer.unMute();
            ytPlayer.setVolume(100);
            if (syncTime) {
                let currentUnix = Math.floor(Date.now() / 1000);
                elapsedSeconds = currentUnix - parseInt(syncTime);
            }
            ytPlayer.seekTo(elapsedSeconds, true);
            ytPlayer.playVideo();
        }
    } else {
        video.muted = false;
        video.volume = 1.0;
        if (syncTime) {
            let currentUnix = Math.floor(Date.now() / 1000);
            video.currentTime = currentUnix - parseInt(syncTime);
        }
        if (video.paused) video.play().catch(e => console.log(e));
    }
    unmuteOverlay.style.display = "none";
    status("Sincronizado con la sala");
});

if (!stream) {
    status("Sin URL");
    unmuteOverlay.style.display = "none";
    statusBox.style.display = "none";
} else {
    stream = decodeURIComponent(stream);
    let ytId = getYouTubeId(stream);

    if (ytId) {
        isYouTube = true;
        video.style.display = "none";
        ytPlaceholder.style.display = "block";

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-placeholder', {
                height: '100%', width: '100%', videoId: ytId,
                playerVars: {
                    'autoplay': 1, 
                    'mute': 1, 
                    'controls': 1, 
                    'rel': 0,
                    'modestbranding': 0, 
                    'playsinline': 0, // Cambiado a 0 para obligar a interfaz de escritorio en SL
                    'iv_load_policy': 3,
                    'start': elapsedSeconds 
                },
                events: {
                    'onReady': function(event) {
                        status("Conectado al cine");
                        event.target.playVideo();
                        if (audioRequested) {
                            event.target.unMute();
                            event.target.setVolume(100);
                        }
                    }
                }
            });
        };

        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    } else if (stream.toLowerCase().indexOf(".m3u8") > -1 || stream.toLowerCase().indexOf(".m3u") > -1) {
        if (Hls.isSupported()) {
            let hls = new Hls({ enableWorker: true, lowLatencyMode: true });
            hls.loadSource(stream); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() { video.play().catch(e => console.log(e)); });
        } else {
            video.src = stream; video.play().catch(e => console.log(e));
        }
    } else {
        video.src = stream;
        video.addEventListener("loadedmetadata", function() {
            if (elapsedSeconds > 0) {
                video.currentTime = elapsedSeconds;
            }
            video.play().catch(e => console.log(e));
        });
    }
}
</script>
</body>
</html>
