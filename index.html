<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>SL TV Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

video {
    width: 100%;
    height: 100%;
    background: black;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>
<body>

<video id="video" controls autoplay></video>

<script>

var video = document.getElementById("video");

var params = new URLSearchParams(window.location.search);
var stream = params.get("url");

if(stream)
{
    stream = decodeURIComponent(stream);

    if(stream.toLowerCase().indexOf(".m3u8") > -1)
    {
        if(Hls.isSupported())
        {
            var hls = new Hls();
            hls.loadSource(stream);
            hls.attachMedia(video);
        }
        else
        {
            video.src = stream;
        }
    }
    else
    {
        video.src = stream;
    }

    video.play();
}
else
{
    document.body.innerHTML =
    '<div style="color:white;font-family:Arial;padding:20px;">No URL received from Second Life</div>';
}

</script>

</body>
</html>
