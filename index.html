<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SL TV Player</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

#video, #yt-placeholder {
    width: 100%;
    height: 100%;
    background: #000;
    border: none;
}

/* Ocultamos el contenedor de YouTube por defecto */
#yt-placeholder {
    display: none;
}

#status {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0, 0, 0, 0.7);
    padding: 5px 10px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    border-radius: 4px;
    z-index: 9999;
    /* Animación para que desaparezca solo después de 4 segundos */
    animation: fadeOut 4s forwards;
    animation-delay: 4s;
    opacity: 1;
}

@keyframes fadeOut {
    0% { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
}

/* Capa transparente que cubre la TV para capturar el clic de activación */
#audio-unmute-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.80);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    cursor: pointer;
}

#unmute-text {
    color: white;
    font-size: 18px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    border: 2px solid white;
    padding: 15px 30px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.1);
    text-align: center;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div id="status">Iniciando...</div>

<div id="audio-unmute-overlay">
    <div id="unmute-text">🔊 TOCAR PANTALLA PARA AUDIO</div>
</div>

<video
    id="video"
    autoplay
    muted
    playsinline
    webkit-playsinline>
</video>

<div id="yt-placeholder"></div>

<script>

const statusBox = document.getElementById("status");
const video = document.getElementById("video");
const ytPlaceholder = document.getElementById("yt-placeholder");
const unmuteOverlay = document.getElementById("audio-unmute-overlay");

let isYouTube = false;
let ytPlayer = null;
let audioRequested = false; // Guarda la intención de activar audio si cargan lento

function status(msg) {
    console.log(msg);
    statusBox.innerHTML = msg;
}

// Función para extraer el ID de video de cualquier formato de enlace de YouTube
function getYouTubeId(url) {
    let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    let match = url.match(regExp);
    if (match && match[2].length === 11) {
        return match[2];
    }
    // Soporte para transmisiones en vivo (/live/)
    if (url.includes("/live/")) {
        let parts = url.split("/live/");
        if (parts[1]) return parts[1].split(/[?#&]/)[0];
    }
    // Soporte para Shorts (/shorts/)
    if (url.includes("/shorts/")) {
        let parts = url.split("/shorts/");
        if (parts[1]) return parts[1].split(/[?#&]/)[0];
    }
    return null;
}

// Al hacer un clic en cualquier parte de la TV, se activa el sonido
unmuteOverlay.addEventListener("click", function() {
    audioRequested = true; // El usuario ya dio permiso de audio
    
    if (isYouTube) {
        if (ytPlayer && typeof ytPlayer.unMute === "function") {
            ytPlayer.unMute();
            ytPlayer.setVolume(100);
            ytPlayer.playVideo();
        }
    } else {
        video.muted = false;
        video.volume = 1.0;
        if (video.paused) {
            video.play().catch(e => console.log("Error al reproducir:", e));
        }
    }
    
    // Ocultamos la capa negra
    unmuteOverlay.style.display = "none";
    status("Audio activado");
});

// Leemos la URL que manda el script de Second Life
const params = new URLSearchParams(window.location.search);
let stream = params.get("url");

if (!stream) {
    status("Sin URL");
    unmuteOverlay.style.display = "none";
    statusBox.style.display = "none";
} else {
    stream = decodeURIComponent(stream);
    status("Conectando...");

    let ytId = getYouTubeId(stream);

    // ==========================================
    // MODO DETECCIÓN: ¿ES UN ENLACE DE YOUTUBE?
    // ==========================================
    if (ytId) {
        isYouTube = true;
        status("Cargando YouTube...");
        
        // Ocultamos la etiqueta de video nativa y mostramos el bloque de YouTube
        video.style.display = "none";
        ytPlaceholder.style.display = "block";

        // Callback global requerido por la API de YouTube
        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-placeholder', {
                height: '100%',
                width: '100%',
                videoId: ytId,
                playerVars: {
                    'autoplay': 1,
                    'mute': 1,
                    'controls': 0,          // Oculta controles nativos de YT
                    'rel': 0,               // Evita videos recomendados de otros canales
                    'modestbranding': 1,    // Quita el logo grande de YT de la barra
                    'playsinline': 1,
                    'iv_load_policy': 3     // Oculta anotaciones y notas en el video
                },
                events: {
                    'onReady': function(event) {
                        status("Reproduciendo YouTube");
                        event.target.playVideo();
                        
                        // Si el usuario tocó la pantalla antes de que cargara la API, forzar audio inmediato
                        if (audioRequested) {
                            event.target.unMute();
                            event.target.setVolume(100);
                        }
                    },
                    'onError': function(event) {
                        statusBox.style.animation = 'none';
                        statusBox.style.opacity = '1';
                        status("Error: YouTube bloqueó la reproducción externa");
                    }
                }
            });
        };

        // Inyectamos dinámicamente el script de la API de Iframe de YouTube
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    } 
    // ==========================================
    // MODO TRADICIONAL: TRANSMISIONES HLS (.M3U8)
    // ==========================================
    else if (stream.toLowerCase().indexOf(".m3u8") > -1 || stream.toLowerCase().indexOf(".m3u") > -1) {
        if (Hls.isSupported()) {
            let hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true
            });

            hls.loadSource(stream);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                status("Reproduciendo HLS");
                video.play().catch(e => console.log(e));
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                console.error("Error HLS:", data);
                if (data.fatal) {
                    statusBox.style.animation = 'none';
                    statusBox.style.opacity = '1';
                    status("Error de red: " + data.details);
                }
            });
        } else {
            video.src = stream;
            video.play().catch(e => console.log(e));
        }
    } 
    // ==========================================
    // MODO TRADICIONAL: ENLACES ARCHIVOS DIRECTOS (.MP4)
    // ==========================================
    else {
        video.src = stream;

        video.addEventListener("loadedmetadata", function() {
            status("Reproduciendo");
            video.play().catch(e => console.log(e));
        });

        video.addEventListener("error", function() {
            statusBox.style.animation = 'none';
            statusBox.style.opacity = '1';
            status("Error: Formato no soportado o enlace roto");
        });
    }
}

</script>
</body>
</html>
