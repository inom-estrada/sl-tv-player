<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instinto E - Súper TV Estable</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        .reproductor {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <!-- REPRODUCTOR A: YouTube (Limpio y sin scripts invasivos para evitar bloqueos) -->
    <iframe id="reproductor-yt" class="reproductor" style="display:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>

    <!-- REPRODUCTOR B: Tu streaming nativo MP4 / M3U8 -->
    <video id="reproductor-directo" class="reproductor" style="display:none;" controls autoplay playsinline></video>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const urlVideo = urlParams.get('url');
        
        const iframeYT = document.getElementById('reproductor-yt');
        const videoDirecto = document.getElementById('reproductor-directo');

        function extraerID(url) {
            if (!url) return null;
            if (url.length === 11) return url;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        if (urlVideo) {
            const esYouTube = urlVideo.includes('youtube.com') || urlVideo.includes('youtu.be') || urlVideo.length === 11;
            const esEnlaceDirecto = urlVideo.includes('.mp4') || urlVideo.includes('.m3u8') || urlVideo.includes('dropbox.com');

            // 1. FORMATOS DIRECTOS (Dropbox, IPTV)
            if (esEnlaceDirecto && !esYouTube) {
                videoDirecto.style.display = "block";
                if (urlVideo.includes('.m3u8') && Hls.isSupported()) {
                    var hls = new Hls();
                    hls.loadSource(urlVideo);
                    hls.attachMedia(videoDirecto);
                } else {
                    videoDirecto.src = urlVideo;
                }
            } 
            // 2. YOUTUBE (Carga estándar 100% compatible y segura)
            else if (esYouTube) {
                const idLimpio = extraerID(urlVideo);
                if (idLimpio) {
                    iframeYT.style.display = "block";
                    // Cargamos el embed base sin parámetros agresivos que alerten a Google
                    iframeYT.src = `https://www.youtube.com/embed/${idLimpio}?autoplay=1&rel=0`;
                }
            }
        }
    </script>
</body>
</html>
