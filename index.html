<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SL TV Player PRO</title>

<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#video {
    width:100%;
    height:100%;
    background:#000;
}

#status {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:6px 10px;
    font-family:Arial;
    font-size:13px;
    z-index:9999;
}

#overlay {
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10000;
    cursor:pointer;
    color:white;
    font-size:18px;
    font-family:Arial;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

</head>

<body>

<div id="status">Iniciando...</div>
<div id="overlay">🔊 CLICK PARA ACTIVAR AUDIO</div>

<video id="video" autoplay muted controls playsinline></video>

<script>

const video = document.getElementById("video");
const statusBox = document.getElementById("status");
const overlay = document.getElementById("overlay");

function setStatus(t){
    console.log(t);
    statusBox.innerHTML = t;
}

// ✔ UNLOCK REAL DE AUDIO (Truco CEF para Firestorm)
overlay.addEventListener("click", async () => {
    try {
        video.muted = false;
        video.volume = 1.0;

        // 🔑 paso 1: play
        await video.play();

        // 🔑 paso 2: truco CEF (re-armar pipeline de audio)
        video.pause();
        video.currentTime = 0;
        await video.play();

        // 🔑 paso 3: asegurar desbloqueo
        video.muted = false;

        overlay.style.display = "none";
        setStatus("Audio ACTIVADO");

    } catch (e) {
        console.log(e);
        setStatus("Error audio unlock");
    }
});

// ✔ AUTO-RECOVERY (si falla stream)
video.addEventListener("error", ()=>{
    setStatus("Reintentando...");
    setTimeout(()=>{
        video.load();
        video.play().catch(()=>{});
    }, 2000);
});

// ✔ KEEP ALIVE (SL evita freezes)
setInterval(()=>{
    if(video.paused){
        video.play().catch(()=>{});
    }
}, 5000);

// detectar stream
const params = new URLSearchParams(window.location.search);
let stream = params.get("url");

if(!stream){
    setStatus("No URL");
    overlay.style.display="none";
} else {

    stream = decodeURIComponent(stream);
    let lower = stream.toLowerCase();

    setStatus("Cargando stream...");

    // --------------------
    // MP4 directo
    // --------------------
    if(lower.endsWith(".mp4")){
        video.src = stream;
        video.play().catch(()=>{});
        setStatus("MP4 reproduciendo");
    }

    // --------------------
    // HLS (.m3u8)
    // --------------------
    else if(lower.includes(".m3u8")){
        if(Hls.isSupported()){
            const hls = new Hls({
                enableWorker:true,
                lowLatencyMode:true
            });

            hls.loadSource(stream);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
                video.play().catch(()=>{});
                setStatus("HLS reproduciendo");
            });

            hls.on(Hls.Events.ERROR, (e,d)=>{
                if(d.fatal){
                    setStatus("Error HLS: " + d.type);
                }
            });

        } else {
            video.src = stream;
            setStatus("HLS fallback nativo");
        }
    }

    // --------------------
    // DASH (.mpd)
    // --------------------
    else if(lower.includes(".mpd")){
        const player = dashjs.MediaPlayer().create();
        player.initialize(video, stream, true);
        setStatus("DASH reproduciendo");
    }

    // --------------------
    // fallback
    // --------------------
    else {
        video.src = stream;

        video.onloadedmetadata = ()=>{
            setStatus("Reproduciendo stream");
            video.play().catch(()=>{});
        };
    }
}

</script>

</body>
</html>
